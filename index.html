<html lang="en" class="dark">

    <!-- SEO Meta Tags -->
    <!-- CUSTOMIZE: Update name, description, and keywords -->
    <title>Your Name | AWS Cloud Engineer</title>
    <meta name="description" content="AWS Cloud Engineer specializing in scalable, secure cloud infrastructure, DevOps, Terraform, Kubernetes, and CI/CD pipelines." />

    <!-- Open Graph / Social Media -->
